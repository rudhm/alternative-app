name: Deploy Backend to Oracle VPS

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'nginx.conf'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fix permissions on Oracle Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            sudo chown -R $USER:$USER /home/ubuntu/cloud-messenger || true

      - name: Copy files to Oracle Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "backend,docker-compose.yml,nginx.conf"
          target: "/home/ubuntu/cloud-messenger"

      - name: Restart Backend Docker Container
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd /home/ubuntu/cloud-messenger
            rm -f backend/test_telegram.ts
            docker container rm -f cloud_messenger_db cloud_messenger_backend cloud_messenger_nginx || true
            docker compose up -d --build

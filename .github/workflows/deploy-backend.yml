name: Deploy Backend to Oracle VPS

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'nginx.conf'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # Navigate to the folder where your code lives on the Oracle server
            # Note: You may need to update this path!
            cd ~/code/alternative
            
            # Pull the latest changes from GitHub
            git pull origin master
            
            # Rebuild and restart the backend Docker container
            docker-compose up -d --build backend
